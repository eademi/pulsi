services:
  postgres:
    image: postgres:17-alpine
    container_name: pulsi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pulsi
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pulsi_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pulsi"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  adminer:
    image: adminer:4.8.1
    container_name: pulsi-adminer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    profiles:
      - tools

volumes:
  pulsi_postgres_data:
